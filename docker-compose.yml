services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ideaforge-postgres
    environment:
      POSTGRES_DB: ideaforge
      POSTGRES_USER: ideaforge
      POSTGRES_PASSWORD: ideaforge_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - ideaforge-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ideaforge -d ideaforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: ideaforge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ideaforge-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO for file storage (S3 compatible)
  minio:
    image: minio/minio:latest
    container_name: ideaforge-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ideaforge
      MINIO_ROOT_PASSWORD: ideaforge_minio_password
    volumes:
      - minio_data:/data
    networks:
      - ideaforge-network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Mailhog for email testing
  mailhog:
    image: mailhog/mailhog:latest
    container_name: ideaforge-mailhog
    ports:
      - "1025:1025"  # SMTP server
      - "8025:8025"  # Web UI
    networks:
      - ideaforge-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  ideaforge-network:
    driver: bridge